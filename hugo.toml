#------------------------------------------------------------------------------
# Hugo Configuration File
#------------------------------------------------------------------------------

#------------------------------------------------------------------------------
# General Settings

baseURL = "https://daniholzer.github.io/my-blog/"
title = "Daniel's Blog"
theme = "hugo-blog-awesome"
defaultContentLanguage = "en-gb"
enableEmoji = true
ignoreErrors = ["additional-script-loading-error"] # ignore error of loading additional scripts.


# set markup.highlight.noClasses=false to enable code highlight
[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
	[markup.tableOfContents]
		startLevel = 2 # ToC starts from H2
		endLevel = 4 # ToC ends at H4
		ordered = false # generates <ul> instead of <ol>


############################## English language ################################
[Languages.en-gb]
  languageName = "English"
  languageCode = "en-gb"
  contentDir = "content/en"
  weight = 1

  [Languages.en-gb.menu]
    [[Languages.en-gb.menu.main]]
      pageRef = "/"
      name = "Home"
      url = "/"
      weight = 10
    [[Languages.en-gb.menu.main]]
      pageRef = "posts"
      name = "Posts"
      url = "/posts/"
      weight = 20
    [[Languages.en-gb.menu.main]]
      pageRef = "about"
      name = "About"
      url = "/about/"
      weight = 30

  [Languages.en-gb.params]
    sitename = "Daniel's Blog"
    description = "Thoughts and milestones I face on my way to Software Engineer"
    defaultColor = "dark"
    mainSections = ["posts"]
    toc = true
    tocOpen = false
    goToTop = true

  [Languages.en-gb.params.author]
    avatar = "avatar.jpg"
    intro = "Daniel's Blog"
    name = "Daniel Holzer"
    description = "Thoughts and milestones I face on my way to Software Engineer"

############################## German language ################################
[Languages.de-de]
  languageName = "German"
  languageCode = "de-de"
  contentDir = "content/de"
  weight = 1

  [Languages.de-de.menu]
    [[Languages.de-de.menu.main]]
      pageRef="/"
      name = 'Startseite'
      url = '/'
      weight = 10
    [[Languages.de-de.menu.main]]
      pageRef="posts"
      name = 'Beiträge'
      url = '/posts/'
      weight = 20
    [[Languages.de-de.menu.main]]
      pageRef="about"
      name = 'Über mich'
      url = '/about/'
      weight = 30

  [Languages.de-de.params]
    sitename = "Daniel's Blog"
    defaultColor = "dark"
    description = "Gedanken und Meilensteine auf meinem Weg zum Softwareentwickler"
    mainSections = ['posts']
    toc = true
    tocOpen = false
    goToTop = true
    additionalScripts = ['js/custom.js', 'js/custom-2.js']
    dateFormat = ""
    rssFeedDescription = "summary"

  [Languages.de-de.params.author]
    avatar = "avatar.jpg"
    intro = "Daniel's Blog"
    name = "Sidharth R"
    description = "Gedanken und Meilensteine auf meinem Weg zum Softwareentwickler"

# Allow to override webmanifest options
[Languages.de-de.params.webmanifest]
  name = "sitename"
  short_name = "sitename"
  start_url = "/"
  theme_color = "#434648"
  background_color = "#fff"
  display = "standalone"

# Allow to override webmanifest options
[Languages.en-gb.params.webmanifest]
  name = "sitename"
  short_name = "sitename"
  start_url = "/"
  theme_color = "#434648"
  background_color = "#fff"
  display = "standalone"


