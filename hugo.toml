#------------------------------------------------------------------------------
# Hugo Configuration File
#------------------------------------------------------------------------------

#------------------------------------------------------------------------------
# General Settings
baseURL = "https://daniholzer.github.io/my-blog/"
title = "Daniel's Blog"
theme = "hugo-blog-awesome"
defaultContentLanguage = "en-gb"
enableEmoji = true
ignoreErrors = ["additional-script-loading-error"] # ignore error of loading additional scripts.


# set markup.highlight.noClasses=false to enable code highlight
[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
	[markup.tableOfContents]
		startLevel = 2 # ToC starts from H2
		endLevel = 4 # ToC ends at H4
		ordered = false # generates <ul> instead of <ol>


############################## English language ################################
[Languages.en-gb]
  languageName = "English"
  languageCode = "en-gb"
  contentDir = "content/en"
  weight = 1

  [Languages.en-gb.menu]
    [[Languages.en-gb.menu.main]]
      name = "Home"
      url = "/"
      weight = 10
    [[Languages.en-gb.menu.main]]
      name = "Posts"
      url = "/posts/"
      weight = 20
    [[Languages.en-gb.menu.main]]
      name = "About"
      url = "/pages/about/"
      weight = 30

  [Languages.en-gb.params]
    sitename = "Daniel's Blog"
    description = "Thoughts and milestones I face on my way to Software Engineer"
    defaultColor = "dark"
    mainSections = ["posts"]
    toc = true
    tocOpen = false
    goToTop = true

  [Languages.en-gb.params.author]
    avatar = "avatar.jpg"
    intro = "Daniel's Blog"
    name = "Daniel Holzer"
    description = "Thoughts and milestones I face on my way to Software Engineer"
    email = "daniel@example.com"

